# mainブランチにpush（マージ）されたら本番のFirebase Hostingへ自動デプロイ
# このサイトはビルド不要の静的サイトのため、ビルドステップはありません
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 主要動線のスモークテスト（グループ作成→URL共有→自動参加→点数入力→結果表示）。
      # 失敗したらここでジョブが止まり、壊れたコードは本番にデプロイされない
      - name: スモークテスト（失敗したらデプロイ中止）
        run: |
          python3 -m pip install --quiet playwright
          python3 -m playwright install --with-deps chromium
          python3 tools/smoke_test.py
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAHJONG_SCORE_2E8AA }}
          channelId: live
          projectId: mahjong-score-2e8aa
