# mainブランチにpush（マージ）されたら本番のFirebase Hostingへ自動デプロイ
# このサイトはビルド不要の静的サイトのため、ビルドステップはありません
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MAHJONG_SCORE_2E8AA }}
          channelId: live
          projectId: mahjong-score-2e8aa
