<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀スコア管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

.view { display: none; min-height: 100vh; flex-direction: column; }
.view.active { display: flex; }

.header { background: #1a237e; color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.back-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 4px 8px; }
.share-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* Home */
#view-home { background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #3949ab 100%); justify-content: center; align-items: center; gap: 20px; }
.home-title { color: #fff; font-size: 28px; font-weight: 800; letter-spacing: 2px; text-align: center; }
.home-sub { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 20px; text-align: center; }
.home-btn { width: 240px; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.home-btn:active { transform: scale(0.97); }
.home-btn-primary { background: #fff; color: #1a237e; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.home-btn-secondary { background: rgba(255,255,255,0.15); color: #fff; border: 2px solid rgba(255,255,255,0.5); }
.join-banner { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 12px; padding: 16px 20px; width: 240px; text-align: center; }
.join-banner p { color: rgba(255,255,255,0.85); font-size: 13px; margin-bottom: 10px; }
.join-banner strong { color: #fff; font-size: 15px; display: block; margin-bottom: 10px; word-break: break-all; }
.join-btn { background: #fff; color: #1a237e; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }

/* Setup */
#view-setup { background: #f0f2f5; }
.form-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-title { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
label { font-size: 13px; color: #555; font-weight: 600; }
input[type=text], input[type=number], select { border: 1.5px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 15px; transition: border-color 0.2s; outline: none; width: 100%; }
input:focus, select:focus { border-color: #1a237e; }
.toggle-group { display: flex; border: 1.5px solid #ddd; border-radius: 8px; overflow: hidden; }
.toggle-btn { flex: 1; padding: 10px; background: #fff; border: none; font-size: 14px; font-weight: 600; cursor: pointer; color: #555; transition: background 0.2s, color 0.2s; }
.toggle-btn.active { background: #1a237e; color: #fff; }
.player-inputs { display: flex; flex-direction: column; gap: 8px; }
.custom-uma-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.custom-uma-grid .field { margin-bottom: 0; }
.submit-btn { background: #1a237e; color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin: 0 16px 24px; }
.submit-btn:active { opacity: 0.85; }

/* Game */
#view-game { background: #f0f2f5; }
.game-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 100px; }
.score-cards { display: flex; flex-direction: column; gap: 10px; }
.score-card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 12px; }
.rank-badge { font-size: 20px; font-weight: 800; color: #1a237e; width: 28px; text-align: center; }
.score-info { flex: 1; }
.score-name { font-size: 14px; font-weight: 700; }
.score-yen { font-size: 12px; color: #888; }
.score-val { font-size: 22px; font-weight: 800; }
.score-val.pos { color: #1a237e; }
.score-val.neg { color: #c62828; }

/* Rounds table */
.rounds-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rounds-table th { background: #1a237e; color: #fff; padding: 8px 6px; text-align: center; font-size: 12px; }
.rounds-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #eee; }
.rounds-table tr:last-child td { border-bottom: none; }
.round-actions { display: flex; gap: 4px; justify-content: center; }
.round-edit-btn { background: #e8f0fe; border: none; color: #1a237e; border-radius: 5px; padding: 3px 7px; font-size: 12px; cursor: pointer; }
.round-del-btn { background: #ffebee; border: none; color: #c62828; border-radius: 5px; padding: 3px 7px; font-size: 12px; cursor: pointer; }

/* Settlement */
.settlement-list { display: flex; flex-direction: column; gap: 10px; }
.settlement-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #f8f9ff; border-radius: 10px; }
.settlement-from { font-weight: 700; font-size: 14px; color: #c62828; flex: 1; }
.settlement-arrow { color: #888; font-size: 16px; }
.settlement-to { font-weight: 700; font-size: 14px; color: #1a237e; flex: 1; text-align: right; }
.settlement-amount { font-size: 15px; font-weight: 800; color: #1a1a1a; white-space: nowrap; margin-left: 8px; }
.settlement-empty { font-size: 13px; color: #aaa; text-align: center; padding: 8px 0; }

.fab { position: fixed; bottom: 24px; right: 24px; background: #1a237e; color: #fff; border: none; border-radius: 50px; padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(26,35,126,0.4); z-index: 100; }
.end-btn { background: #c62828; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }

/* Confirm modal */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; padding: 24px; }
.modal-backdrop.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 320px; text-align: center; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal-desc { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6; }
.modal-btns { display: flex; gap: 10px; }
.modal-cancel { flex: 1; background: #f0f0f0; color: #555; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
.modal-danger { flex: 1; background: #c62828; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* Edited badge */
.edited-badge { display: inline-block; font-size: 10px; color: #888; background: #f0f0f0; border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; white-space: nowrap; }

/* Player name chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { background: #e8f0fe; color: #1a237e; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
.chip:active { opacity: 0.7; }
.chips-hint { font-size: 11px; color: #999; margin-bottom: 6px; }

/* Edit tab (rounds) */
.edit-tab { background: #f0f0f0; border: none; color: #999; border-radius: 5px; padding: 3px 8px; font-size: 11px; cursor: pointer; font-weight: 600; }
.edit-tab:active { background: #e0e0e0; }

/* Action modal buttons */
.modal-action { display: block; width: 100%; background: #f8f9ff; color: #1a237e; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
.modal-action.danger { background: #ffebee; color: #c62828; }

/* Change log */
details.log-details summary { list-style: none; cursor: pointer; font-size: 12px; font-weight: 700; color: #888; user-select: none; margin-top: 12px; }
details.log-details summary::-webkit-details-marker { display: none; }
.log-list { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.log-row { font-size: 12px; color: #666; background: #f8f8f8; border-radius: 6px; padding: 6px 10px; }
.log-row .log-time { color: #999; margin-right: 6px; font-variant-numeric: tabular-nums; }

/* Rank medal colors */
.rank-badge.rank-1 { color: #d4a017; }
.rank-badge.rank-2 { color: #8e9aa5; }
.rank-badge.rank-3 { color: #b46a3c; }
.rank-badge.rank-last { color: #546e7a; }
.rank-emoji { font-size: 18px; display: block; line-height: 1; }
.rank-num { font-size: 12px; font-weight: 800; display: block; }

/* Form modal (settings edit) */
.form-modal-box { background: #fff; border-radius: 16px; padding: 20px 16px; width: 100%; max-width: 360px; max-height: 82vh; overflow-y: auto; text-align: left; }
.form-modal-title { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 14px; }

/* Score chart */
.chart-wrap { width: 100%; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; justify-content: center; }
.chart-legend span { font-size: 12px; font-weight: 600; color: #555; display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

/* Toast */
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Loading */
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
.spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #1a237e; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Sheet */
.backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
.backdrop.open { display: block; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 32px; z-index: 201; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); max-height: 90vh; overflow-y: auto; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 16px; }
.sheet-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.sheet-row { display: flex; align-items: center; gap: 10px; }
.sheet-row label { width: 90px; font-size: 13px; font-weight: 600; color: #555; flex-shrink: 0; }
.sheet-row input { flex: 1; border: 1.5px solid #ddd; border-radius: 8px; padding: 10px; font-size: 16px; text-align: right; outline: none; }
.sheet-row input:focus { border-color: #1a237e; }
.auto-btn { background: #e8f0fe; color: #1a237e; border: 1.5px solid #1a237e; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; }
.auto-btn:disabled { background: #f0f0f0; color: #bbb; border-color: #ddd; cursor: not-allowed; }
.total-check { text-align: center; font-size: 13px; margin-bottom: 16px; padding: 8px; border-radius: 8px; font-weight: 600; }
.total-check.ok { background: #e8f5e9; color: #2e7d32; }
.total-check.ng { background: #ffebee; color: #c62828; }
.confirm-btn { background: #1a237e; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
.confirm-btn:disabled { background: #aaa; cursor: not-allowed; }

/* History */
#view-history { background: #f0f2f5; }
.history-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.history-item { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); cursor: pointer; display: flex; align-items: center; gap: 12px; }
.history-item:active { opacity: 0.75; }
.history-info { flex: 1; }
.history-name { font-size: 15px; font-weight: 700; }
.history-meta { font-size: 12px; color: #888; margin-top: 2px; }
.history-arrow { color: #bbb; font-size: 18px; }
.empty-msg { text-align: center; color: #aaa; margin-top: 60px; font-size: 15px; }

/* Detail */
#view-detail { background: #f0f2f5; }
.detail-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 24px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="home-title">🀄 麻雀スコア</div>
  <div class="home-sub">スコア管理アプリ</div>
  <button class="home-btn home-btn-primary" onclick="showView('setup')">新しい対局を始める</button>
  <button class="home-btn home-btn-secondary" onclick="showView('history')">過去の戦績を振り返る</button>
  <div class="join-banner" id="join-banner" style="display:none">
    <p>共有されたゲームがあります</p>
    <button class="join-btn" onclick="joinFromBanner()">このゲームに参加する</button>
  </div>
</div>

<!-- SETUP -->
<div id="view-setup" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('home')">←</button>
    <h1>ゲーム設定</h1>
  </div>
  <div class="form-body">
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="field">
        <label>ゲーム名</label>
        <input type="text" id="s-name" placeholder="例: 2025-07-01">
      </div>
      <div class="field">
        <label>人数</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="p4-btn" onclick="setPlayers(4)">4人</button>
          <button class="toggle-btn" id="p3-btn" onclick="setPlayers(3)">3人</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">プレイヤー名</div>
      <div id="saved-players-area" style="display:none">
        <div class="chips-hint">保存済みの名前（タップで入力）</div>
        <div class="chips" id="saved-player-chips"></div>
      </div>
      <div class="player-inputs" id="player-inputs"></div>
    </div>
    <div class="card">
      <div class="card-title">点数設定</div>
      <div class="field">
        <label>持ち点</label>
        <input type="number" id="s-start" value="25000">
      </div>
      <div class="field">
        <label>返し点</label>
        <input type="number" id="s-return" value="30000">
      </div>
    </div>
    <div class="card">
      <div class="card-title">ウマ</div>
      <div class="field">
        <select id="s-uma" onchange="onUmaChange()">
          <option value="10-30">10-30</option>
          <option value="10-20">10-20</option>
          <option value="5-15">5-15</option>
          <option value="5-10">5-10</option>
          <option value="0">なし</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div id="uma-custom" style="display:none">
        <div class="custom-uma-grid" id="uma-custom-fields"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">レート</div>
      <div class="field">
        <select id="s-rate" onchange="onRateChange()">
          <option value="10">×10（テンイチ）</option>
          <option value="20">×20（テンニ）</option>
          <option value="30">×30（テンサン）</option>
          <option value="50">×50（テンゴ）</option>
          <option value="100">×100（テンピン）</option>
          <option value="200">×200（テンリャンピン）</option>
          <option value="500">×500（ゴジュー）</option>
          <option value="1000">×1000（デカピン）</option>
          <option value="2000">×2000（デカリャンピン）</option>
          <option value="0">なし</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div id="rate-custom" style="display:none">
        <div class="field">
          <label>カスタムレート（倍率）</label>
          <input type="number" id="s-rate-custom" placeholder="例: 150">
        </div>
      </div>
    </div>
  </div>
  <button class="submit-btn" onclick="startGame()">ゲームを開始する →</button>
</div>

<!-- GAME -->
<div id="view-game" class="view">
  <div class="header">
    <button class="back-btn" onclick="leaveGame()">←</button>
    <h1 id="game-title">ゲーム中</h1>
    <button class="share-btn" onclick="openGameEdit()">✏ 編集</button>
    <button class="share-btn" onclick="copyUrl()">🔗 共有</button>
  </div>
  <div class="game-body">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin-bottom:0">合計スコア</div>
        <button class="edit-tab" id="yen-toggle" onclick="toggleYen()">金額表示</button>
      </div>
      <div class="score-cards" id="score-cards"></div>
    </div>
    <div class="card">
      <div class="card-title">局履歴</div>
      <div style="overflow-x:auto">
        <table class="rounds-table" id="rounds-table"></table>
      </div>
    </div>
    <div class="card" id="chart-card" style="display:none">
      <div class="card-title">スコア推移</div>
      <div class="chart-wrap" id="chart-body"></div>
    </div>
  </div>
  <button class="fab" onclick="openSheet(-1)">＋ 点数入力</button>
</div>

<!-- HISTORY -->
<div id="view-history" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('home')">←</button>
    <h1>過去の戦績</h1>
  </div>
  <div class="history-body" id="history-body"></div>
</div>

<!-- DETAIL -->
<div id="view-detail" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('history')">←</button>
    <h1 id="detail-title">結果詳細</h1>
    <button class="share-btn" onclick="openDetailEdit()">✏ 編集</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Bottom sheet -->
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="score-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">点数入力</div>
  <div class="sheet-inputs" id="sheet-inputs"></div>
  <button class="auto-btn" id="auto-btn" onclick="autoFill()" disabled>残り1人を自動入力</button>
  <div class="total-check ng" id="total-check">点数を入力してください</div>
  <button class="confirm-btn" id="confirm-btn" onclick="submitRound()" disabled>入力完了</button>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal">
    <div class="modal-title" id="confirm-modal-title">確認</div>
    <div class="modal-desc" id="confirm-modal-desc"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeConfirmModal()">キャンセル</button>
      <button class="modal-danger" id="confirm-modal-ok">削除する</button>
    </div>
  </div>
</div>

<!-- Round action menu -->
<div class="modal-backdrop" id="action-modal" onclick="if(event.target===this)closeActionModal()">
  <div class="modal">
    <div class="modal-title" id="action-modal-title">編集</div>
    <div id="action-modal-body"></div>
    <button class="modal-cancel" style="width:100%" onclick="closeActionModal()">キャンセル</button>
  </div>
</div>

<!-- Form modal (settings / detail edit) -->
<div class="modal-backdrop" id="form-modal" onclick="if(event.target===this)closeFormModal()">
  <div class="form-modal-box">
    <div class="form-modal-title" id="form-modal-title">編集</div>
    <div id="form-modal-body"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  storageBucket: "mahjong-score-2e8aa.firebasestorage.app",
  messagingSenderId: "742827563606",
  appId: "1:742827563606:web:91b4e849caa99eda7f39f7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const UMA_MAP = {
  '10-30': [30, 10, -10, -30],
  '10-20': [20, 10, -10, -20],
  '5-15':  [15, 5, -5, -15],
  '5-10':  [10, 5, -5, -10],
  '0':     [0, 0, 0, 0]

let numPlayers = 4;
let activeGame = null;
let sessionId = null;
let sessionRef = null;
let sessionCallback = null;
let pendingSessionId = null;
let editingIndex = -1; // 修正中の局インデックス（-1 = 新規）
let appState = { games: [], players: [] };
let showYen = true; // 合計スコアの金額表示ON/OFF
function toggleYen() { showYen = !showYen; renderGame(); }

// ---- Storage ----
function loadStorage() {
  try { const d = localStorage.getItem('mahjong-v3'); if (d) appState = JSON.parse(d); } catch(e) {}
  if (!appState.players) appState.players = [];
}
function saveStorage() {
  localStorage.setItem('mahjong-v3', JSON.stringify(appState));
}
function saveToLocalHistory() {
  if (!activeGame) return;
  const idx = appState.games.findIndex(g => g.id === activeGame.id);
  if (idx >= 0) appState.games[idx] = activeGame;
  else appState.games.unshift(activeGame);
  saveStorage();
}

// ---- Firebase ----
function generateSessionId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  return Array.from({length: 10}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}
function startListening() {
  stopListening();
  sessionRef = db.ref('sessions/' + sessionId);
  sessionCallback = sessionRef.on('value', snapshot => {
    const data = snapshot.val();
    if (!data) return;
    const normArr = v => v ? (Array.isArray(v) ? v : Object.values(v)).filter(Boolean) : [];
    activeGame = { ...data, rounds: normArr(data.rounds), log: normArr(data.log) };
    renderGame();
    // 編集のたびに自動保存（過去の戦績に即時反映）
    if (activeGame.rounds.length > 0 || activeGame.log.length > 0) saveToLocalHistory();
  });
}
function stopListening() {
  if (sessionRef && sessionCallback) {
    sessionRef.off('value', sessionCallback);
    sessionCallback = null; sessionRef = null;
  }
}
async function writeRoundsToFirebase(rounds, logEntry) {
  const updates = { rounds: rounds.length ? rounds : null };
  if (logEntry) updates.log = [...(activeGame.log || []), logEntry];
  await db.ref('sessions/' + sessionId).update(updates);
}
function fmtTime(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

// ---- Views ----
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'setup') initSetupForm();
  if (name === 'home') { history.replaceState(null, '', location.pathname); checkPendingSession(); }
}
function checkPendingSession() {
  document.getElementById('join-banner').style.display = pendingSessionId ? 'block' : 'none';
}
function copyUrl() {
  const url = location.href;
  if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => showToast('URLをコピーしました'));
  else { const ta = document.createElement('textarea'); ta.value = url; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('URLをコピーしました'); }
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function showLoading(show) {
  let el = document.getElementById('loading-overlay');
  if (show) {
    if (!el) { el = document.createElement('div'); el.id = 'loading-overlay'; el.className = 'loading-overlay'; el.innerHTML = '<div class="spinner"></div><div style="color:#555;font-size:14px">読み込み中...</div>'; document.body.appendChild(el); }
    el.style.display = 'flex';
  } else { if (el) el.style.display = 'none'; }
}
async function joinSession(id) {
  showLoading(true);
  try {
    const snap = await db.ref('sessions/' + id).once('value');
    if (!snap.exists()) { showLoading(false); alert('このURLのゲームは見つかりませんでした。'); return; }
    sessionId = id;
    history.replaceState(null, '', '#' + id);
    startListening(); showView('game');
  } catch(e) { alert('接続エラーが発生しました。'); } finally { showLoading(false); }
}
function joinFromBanner() { if (pendingSessionId) joinSession(pendingSessionId); }

// ---- Setup ----
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function initSetupForm() {
  document.getElementById('s-name').value = todayStr();
  document.getElementById('s-rate').value = '100'; // デフォルト: テンピン
  numPlayers = 4;
  document.getElementById('p4-btn').classList.add('active');
  document.getElementById('p3-btn').classList.remove('active');
  buildPlayerInputs(); renderPlayerChips(); onUmaChange(); onRateChange();
}
// ---- プレイヤー名の保存 ----
function renderPlayerChips() {
  const area = document.getElementById('saved-players-area');
  const chips = document.getElementById('saved-player-chips');
  if (!appState.players || appState.players.length === 0) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  chips.innerHTML = appState.players.map(name =>
    `<button class="chip" onclick="fillPlayerName(this)" data-name="${esc(name)}">${esc(name)}</button>`
  ).join('');
}
function fillPlayerName(btn) {
  const name = btn.getAttribute('data-name');
  // デフォルト値（プレイヤーN）のままの最初の欄に入れる。全て変更済みなら最初の欄。
  for (let i = 0; i < numPlayers; i++) {
    const el = document.getElementById('p-name-' + i);
    if (el && (el.value === '' || /^プレイヤー\d$/.test(el.value))) { el.value = name; return; }
  }
  document.getElementById('p-name-0').value = name;
}
function savePlayerNames(names) {
  names.forEach(name => {
    if (!/^プレイヤー\d$/.test(name) && !appState.players.includes(name)) appState.players.push(name);
  });
  saveStorage();
}
function setPlayers(n) {
  numPlayers = n;
  document.getElementById('p4-btn').classList.toggle('active', n === 4);
  document.getElementById('p3-btn').classList.toggle('active', n === 3);
  buildPlayerInputs(); onUmaChange();
}
function buildPlayerInputs() {
  const container = document.getElementById('player-inputs');
  container.innerHTML = '';
  ['プレイヤー1','プレイヤー2','プレイヤー3','プレイヤー4'].slice(0, numPlayers).forEach((def, i) => {
    const inp = document.createElement('input');
    inp.type = 'text'; inp.id = 'p-name-' + i; inp.placeholder = def; inp.value = def;
    inp.style.cssText = 'border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;outline:none;width:100%;transition:border-color 0.2s';
    inp.onfocus = function() { this.style.borderColor='#1a237e'; };
    inp.onblur = function() { this.style.borderColor='#ddd'; };
    container.appendChild(inp);

}
function onUmaChange() {
  const v = document.getElementById('s-uma').value;
  const customDiv = document.getElementById('uma-custom');
  if (v === 'custom') {
    customDiv.style.display = 'block';
    const grid = document.getElementById('uma-custom-fields'); grid.innerHTML = '';
    (numPlayers === 3 ? ['1位','2位','3位'] : ['1位','2位','3位','4位']).forEach((r, i) => {
      const div = document.createElement('div'); div.className = 'field';
      div.innerHTML = `<label>${r}</label><input type="number" id="uma-c-${i}" value="0" style="border:1.5px solid #ddd;border-radius:8px;padding:10px;font-size:15px;outline:none;width:100%">`;
      grid.appendChild(div);
    });
  } else { customDiv.style.display = 'none'; }
}
function onRateChange() {
  document.getElementById('rate-custom').style.display = document.getElementById('s-rate').value === 'custom' ? 'block' : 'none';
}
function getUmaArray() {
  const v = document.getElementById('s-uma').value;
  if (v === 'custom') return Array.from({length: numPlayers}, (_, i) => Number(document.getElementById('uma-c-'+i).value) || 0);
  const full = UMA_MAP[v] || [0,0,0,0];
  return numPlayers === 3 ? [full[0], full[1], full[3]] : full.slice(0,4);
}
async function startGame() {
  const name = document.getElementById('s-name').value.trim() || todayStr();
  const playerNames = Array.from({length: numPlayers}, (_, i) => document.getElementById('p-name-'+i).value.trim() || ('プレイヤー'+(i+1)));
  const startPoints = Number(document.getElementById('s-start').value) || 25000;
  const returnPoints = Number(document.getElementById('s-return').value) || 30000;
  const uma = getUmaArray();
  const rateVal = document.getElementById('s-rate').value;
  const rate = rateVal === 'custom' ? (Number(document.getElementById('s-rate-custom').value) || 1) : Number(rateVal);
  savePlayerNames(playerNames);
  sessionId = generateSessionId();
  const game = { id: sessionId, name, createdAt: new Date().toISOString(), settings: { playerNames, numPlayers, startPoints, returnPoints, uma, rate }, rounds: [] };
  showLoading(true);
  try {
    await db.ref('sessions/' + sessionId).set(game);
    history.replaceState(null, '', '#' + sessionId);
    startListening(); showView('game');
  } catch(e) { alert('ゲームの作成に失敗しました。'); } finally { showLoading(false); }
}

// ---- Game ----
function calcScores(points, settings) {
  const n = settings.numPlayers;
  const diffs = points.map(p => (p - settings.returnPoints) / 1000);
  const order = diffs.map((d,i) => ({d,i})).sort((a,b) => b.d - a.d);
  const result = new Array(n);
  order.forEach((o, rank) => { result[o.i] = Math.round((diffs[o.i] + settings.uma[rank]) * 10) / 10; });
  return result;
}
function getTotals() {
  if (!activeGame) return [];
  const n = activeGame.settings.numPlayers;
  const totals = new Array(n).fill(0);
  activeGame.rounds.forEach(r => r.scores.forEach((s, i) => totals[i] += s));
  return totals.map(t => Math.round(t * 10) / 10);
}

// ---- 順位バッジ（メダル） ----
// 1〜3位は金銀銅メダル、4位は最下位カラー（🌑）
function rankBadgeHtml(rank) {
  const emojis = ['🥇', '🥈', '🥉'];
  if (rank < 3) {
    return `<div class="rank-badge rank-${rank+1}"><span class="rank-emoji">${emojis[rank]}</span><span class="rank-num">${rank+1}位</span></div>`;
  }
  return `<div class="rank-badge rank-last"><span class="rank-emoji">👿</span><span class="rank-num">${rank+1}位</span></div>`;
}

// ---- スコア推移グラフ（SVG） ----
const CHART_COLORS = ['#1a237e', '#c62828', '#2e7d32', '#f9a825'];
function chartHtml(rounds, playerNames) {
  if (!rounds || rounds.length === 0) return '';
  const n = playerNames.length;
  // 0局目=全員0から始まる累積スコア
  const series = Array.from({length: n}, () => [0]);
  rounds.forEach(r => r.scores.forEach((sc, i) => {
    series[i].push(Math.round((series[i][series[i].length-1] + sc) * 10) / 10);
  }));
  const all = series.flat();
  let min = Math.min(...all), max = Math.max(...all);
  if (min === max) { min -= 10; max += 10; }
  const range = max - min;
  min -= range * 0.08; max += range * 0.08;

  const W = 340, H = 200, left = 42, right = 12, top = 10, bottom = 24;
  const R = rounds.length;
  const px = i => left + (W - left - right) * (i / R);
  const py = v => top + (H - top - bottom) * ((max - v) / (max - min));

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">`;
  // 横グリッド線（50刻み）
  const gridVals = [];
  for (let v = Math.ceil(min / 50) * 50; v <= max; v += 50) gridVals.push(v);
  if (gridVals.length === 0) gridVals.push(0);
  gridVals.forEach(v => {
    const y = py(v);
    const strong = v === 0;
    svg += `<line x1="${left}" y1="${y}" x2="${W-right}" y2="${y}" stroke="${strong ? '#bbb' : '#e5e5e5'}" stroke-width="${strong ? 1.5 : 1}"/>`;
    svg += `<text x="${left-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#999">${v > 0 ? '+' : ''}${v}</text>`;
  });
  // X軸ラベル（局番号）
  for (let i = 0; i <= R; i++) {
    svg += `<text x="${px(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="#999">${i}</text>`;
  }
  // 折れ線
  series.forEach((s, i) => {
    const color = CHART_COLORS[i % CHART_COLORS.length];
    const pts = s.map((v, x) => `${px(x)},${py(v)}`).join(' ');
    svg += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    s.forEach((v, x) => { svg += `<circle cx="${px(x)}" cy="${py(v)}" r="3" fill="${color}"/>`; });
  });
  svg += '</svg>';

  const legend = '<div class="chart-legend">' + playerNames.map((nm, i) =>
    `<span><span class="legend-dot" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></span>${esc(nm)}</span>`
  ).join('') + '</div>';
  return svg + legend;
}

// ---- 局履歴テーブルの共通パーツ ----
// 局履歴と順位取得回数で列幅を揃えるため、先頭列は固定幅・table-layout:fixed を共用
const FIRST_COL_TH = '<th style="width:44px">';
function roundsTheadHtml(names) {
  return `<thead><tr>${FIRST_COL_TH}局</th>${names.map(n=>`<th>${esc(n)}</th>`).join('')}</tr></thead>`;
}
// 行タップで編集メニューを開く。修正済みは局番号の下に小さく表示
function roundRowHtml(r, idx, onclickJs) {
  const cells = r.scores.map((sc, i) => {
    const st = sc > 0 ? 'color:#1a237e;font-weight:700' : sc < 0 ? 'color:#c62828;font-weight:700' : '';
    const raw = (r.points && r.points[i] != null)
      ? `<div style="font-size:9px;color:#c0c4cc;font-weight:400;margin-top:1px">${r.points[i].toLocaleString()}</div>`
      : '';
    return `<td style="${st}"><div>${sc > 0 ? '+' : ''}${sc.toFixed(1)}</div>${raw}</td>`;
  }).join('');
  const editedMark = r.edited ? '<div style="font-size:9px;color:#c0c4cc;margin-top:1px">修正済</div>' : '';
  return `<tr onclick="${onclickJs}" style="cursor:pointer">
    <td style="color:#888"><div>${idx+1}</div>${editedMark}</td>
    ${cells}
  </tr>`;
}

// ---- 順位取得回数 ----
function rankCountHtml(rounds, names) {
  if (!rounds || rounds.length === 0) return '';
  const n = names.length;
  const counts = Array.from({length: n}, () => new Array(n).fill(0));
  rounds.forEach(r => {
    const order = r.scores.map((sc, i) => ({sc, i})).sort((a, b) => b.sc - a.sc);
    order.forEach((o, rank) => counts[o.i][rank]++);
  });
  const rows = Array.from({length: n}, (_, rank) => {
    const cells = names.map((_, i) => {
      const c = counts[i][rank];
      return `<td style="${c > 0 ? 'font-weight:700' : 'color:#ccc'}">${c}回</td>`;
    }).join('');
    return `<tr><td style="color:#888">${rank+1}位</td>${cells}</tr>`;
  }).join('');
  return `<div style="border-top:1px solid #eee;margin-top:14px;padding-top:14px">
    <div class="card-title">順位取得回数</div>
    <div style="overflow-x:auto"><table class="rounds-table" style="table-layout:fixed">
      <thead><tr>${FIRST_COL_TH}順位</th>${names.map(nm => `<th>${esc(nm)}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

// ---- 履歴表示（入力・修正・削除の3パターン） ----
function renderLogHtml(log) {
  const events = (log || []).filter(e => e.type === 'add' || e.type === 'edit' || e.type === 'delete');
  if (events.length === 0) return '';
  const fmtPts = pts => pts ? pts.map(p => p.toLocaleString()).join(' / ') : '';
  const sub = 'font-size:11px;color:#999;margin-top:2px';
  const rows = events.map(e => {
    const head = `<div><span class="log-time">${fmtTime(e.at)}</span><b>${esc(e.label)}</b></div>`;
    let body = '';
    if (e.type === 'add' && e.points) {
      body = `<div style="${sub}">${fmtPts(e.points)}</div>`;
    } else if (e.type === 'edit') {
      if (e.prev) body += `<div style="${sub}">${fmtPts(e.prev)}（修正前）</div>`;
      if (e.points) body += `<div style="${sub}">${fmtPts(e.points)}（修正後）</div>`;
    } else if (e.type === 'delete' && e.points) {
      body = `<div style="${sub}">${fmtPts(e.points)}（削除前）</div>`;
    }
    return `<div class="log-row">${head}${body}</div>`;
  }).join('');
  return `<details class="log-details">
    <summary>履歴（${events.length}件）▸</summary>
    <div class="log-list">${rows}</div>
  </details>`;
}

function renderGame() {
  if (!activeGame) return;
  const s = activeGame.settings;
  document.getElementById('game-title').textContent = activeGame.name;

  // スコアカード
  document.getElementById('yen-toggle').textContent = showYen ? '金額表示' : 'スコア表示';
  const totals = getTotals();
  const ranked = totals.map((t,i) => ({t, i, name: s.playerNames[i]})).sort((a,b) => b.t - a.t);
  document.getElementById('score-cards').innerHTML = ranked.map((p, rank) => {
    const yenStr = (showYen && s.rate) ? `${(p.t * s.rate).toLocaleString()}円` : '';
    const cls = p.t >= 0 ? 'pos' : 'neg';
    return `<div class="score-card">
      ${rankBadgeHtml(rank)}
      <div class="score-info">
        <div class="score-name">${esc(p.name)}</div>
        ${yenStr ? `<div class="score-yen">${yenStr}</div>` : ''}
      </div>
      <div class="score-val ${cls}">${p.t >= 0 ? '+' : ''}${p.t.toFixed(1)}</div>
    </div>`;
  }).join('');

  // 局履歴（行タップで編集メニュー）
  const hasRounds = activeGame.rounds.length > 0;
  let tableHtml = roundsTheadHtml(s.playerNames) + '<tbody>';
  if (hasRounds) {
    tableHtml += activeGame.rounds.map((r, idx) => roundRowHtml(r, idx, `openRoundMenu(${idx})`)).join('');
  } else {
    tableHtml += `<tr><td colspan="${s.numPlayers + 1}" style="color:#bbb;padding:16px">局なし</td></tr>`;
  }
  tableHtml += '</tbody>';
  const table = document.getElementById('rounds-table');
  table.style.tableLayout = 'fixed';
  table.innerHTML = tableHtml;

  // 履歴＋順位取得回数
  let logEl = document.getElementById('game-log');
  if (!logEl) {
    logEl = document.createElement('div'); logEl.id = 'game-log';
    table.closest('.card').appendChild(logEl);
  }
  logEl.innerHTML = (hasRounds ? '<div style="font-size:11px;color:#aaa;margin-top:6px">行をタップすると修正・削除できます</div>' : '')
    + renderLogHtml(activeGame.log)
    + rankCountHtml(activeGame.rounds, s.playerNames);

  // スコア推移グラフ
  const chartCard = document.getElementById('chart-card');
  if (hasRounds) {
    chartCard.style.display = 'block';
    document.getElementById('chart-body').innerHTML = chartHtml(activeGame.rounds, s.playerNames);
  } else {
    chartCard.style.display = 'none';
  }
}

function leaveGame() {
  if (activeGame && (activeGame.rounds.length > 0 || (activeGame.log || []).length > 0)) saveToLocalHistory();
  stopListening();
  const saved = sessionId;
  activeGame = null; sessionId = null; pendingSessionId = saved;
  history.replaceState(null, '', location.pathname);
  showView('home');
}

// ---- 局の編集メニュー ----
function openRoundMenu(idx) {
  document.getElementById('action-modal-title').textContent = `第${idx+1}局`;
  document.getElementById('action-modal-body').innerHTML =
    `<button class="modal-action" onclick="closeActionModal();openSheet(${idx})">点数を修正する</button>
     <button class="modal-action danger" onclick="closeActionModal();confirmDeleteRound(${idx})">この局を削除する</button>`;
  document.getElementById('action-modal').classList.add('open');
}
function closeActionModal() {
  document.getElementById('action-modal').classList.remove('open');
}
function confirmDeleteRound(idx) {
  document.getElementById('confirm-modal-title').textContent = `第${idx+1}局を削除`;
  document.getElementById('confirm-modal-desc').textContent = 'この局の記録を削除します。全員の画面から削除されます（変更履歴には残ります）。よろしいですか？';
  document.getElementById('confirm-modal-ok').onclick = () => { closeConfirmModal(); deleteRound(idx); };
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirmModal() {
  document.getElementById('confirm-modal').classList.remove('open');
}
async function deleteRound(idx) {
  if (!activeGame) return;
  const old = activeGame.rounds[idx];
  const newRounds = activeGame.rounds.filter((_, i) => i !== idx);
  const logEntry = { type: 'delete', at: new Date().toISOString(), label: `第${idx+1}局を削除`, points: old ? old.points : null };
  try {
    await writeRoundsToFirebase(newRounds, logEntry);
    showToast('削除しました');
  } catch(e) { showToast('削除に失敗しました'); }
}

// ---- 点数入力シート ----
// sheetCtx: 入力対象（進行中ゲーム or 過去の結果）を切り替える
let sheetCtx = null;
function liveSheetCtx() {
  return {
    settings: activeGame.settings,
    rounds: activeGame.rounds,
    save: (rounds, logEntry) => writeRoundsToFirebase(rounds, logEntry)
  };
}
// idx = -1: 新規, idx >= 0: 修正
function openSheet(idx) {
  openSheetCtx(liveSheetCtx(), idx);
}
function openSheetCtx(ctx, idx) {
  sheetCtx = ctx;
  editingIndex = idx;
  const s = ctx.settings;
  const n = s.numPlayers;
  const isEdit = idx >= 0;
  const existingPoints = isEdit ? ctx.rounds[idx].points : null;

  document.getElementById('sheet-title').textContent = isEdit ? `第${idx+1}局を修正` : '点数入力';
  const inputs = document.getElementById('sheet-inputs');
  inputs.innerHTML = s.playerNames.map((name, i) =>
    `<div class="sheet-row">
      <label>${esc(name)}</label>
      <input type="number" id="si-${i}" placeholder="点数" oninput="updateTotal()"
        value="${isEdit ? existingPoints[i] : ''}">
    </div>`
  ).join('');

  document.getElementById('total-check').textContent = '点数を入力してください';
  document.getElementById('total-check').className = 'total-check ng';
  document.getElementById('auto-btn').disabled = true;
  document.getElementById('confirm-btn').disabled = true;
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('score-sheet').classList.add('open');

  // 修正モードでは初期値があるので合計を計算
  if (isEdit) updateTotal();
  else setTimeout(() => { const el = document.getElementById('si-0'); if(el) el.focus(); }, 350);
}
function closeSheet() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('score-sheet').classList.remove('open');
  editingIndex = -1;
}
function updateTotal() {
  const n = sheetCtx.settings.numPlayers;
  const expected = sheetCtx.settings.startPoints * n;
  const values = Array.from({length: n}, (_, i) => {
    const el = document.getElementById('si-' + i);
    return el.value === '' ? null : Number(el.value);
  });
  const emptyIndices = values.map((v,i) => v === null ? i : -1).filter(i => i >= 0);
  const filled = values.filter(v => v !== null).reduce((s,v) => s+v, 0);
  const total = values.reduce((s, v) => s + (v ?? 0), 0);
  document.getElementById('auto-btn').disabled = emptyIndices.length !== 1;
  const el = document.getElementById('total-check');
  const btn = document.getElementById('confirm-btn');
  if (emptyIndices.length === 0 && total === expected) {
    el.textContent = `入力合計: ${total.toLocaleString()} ✓`;
    el.className = 'total-check ok'; btn.disabled = false;
  } else {
    el.textContent = `入力合計: ${filled.toLocaleString()}`;
    el.className = 'total-check ng'; btn.disabled = true;
  }
}
function autoFill() {
  const n = sheetCtx.settings.numPlayers;
  const expected = sheetCtx.settings.startPoints * n;
  let filledSum = 0, emptyIdx = -1;
  for (let i = 0; i < n; i++) {
    const el = document.getElementById('si-' + i);
    if (el.value === '') emptyIdx = i; else filledSum += Number(el.value);
  }
  if (emptyIdx < 0) return;
  document.getElementById('si-' + emptyIdx).value = expected - filledSum;
  updateTotal();
}
async function submitRound() {
  const ctx = sheetCtx;
  const n = ctx.settings.numPlayers;
  const points = Array.from({length: n}, (_, i) => Number(document.getElementById('si-'+i).value) || 0);
  const scores = calcScores(points, ctx.settings);
  const now = new Date().toISOString();
  const newRounds = [...ctx.rounds];
  let logEntry;
  if (editingIndex >= 0) {
    const orig = ctx.rounds[editingIndex];
    newRounds[editingIndex] = { points, scores, at: orig.at || now, edited: true }; // 修正
    logEntry = { type: 'edit', at: now, label: `第${editingIndex+1}局を修正`, prev: orig.points || null, points };
  } else {
    newRounds.push({ points, scores, at: now }); // 新規
    logEntry = { type: 'add', at: now, label: `第${newRounds.length}局を入力`, points };
  }
  closeSheet();
  try {
    await ctx.save(newRounds, logEntry);
  } catch(e) { showToast('保存に失敗しました'); }
}

// ---- 設定編集（ゲーム中） ----
function closeFormModal() {
  document.getElementById('form-modal').classList.remove('open');
}
function umaKeyOf(uma, n) {
  for (const k of Object.keys(UMA_MAP)) {
    const full = UMA_MAP[k];
    const arr = n === 3 ? [full[0], full[1], full[3]] : full.slice(0, 4);
    if (arr.length === uma.length && arr.every((v, i) => v === uma[i])) return k;
  }
  return 'custom';
}
const RATE_PRESETS = ['10','20','30','50','100','200','500','1000','2000','0'];
function settingsFormHtml(name, s, prefix) {
  const n = s.numPlayers;
  const umaKey = umaKeyOf(s.uma, n);
  const rateKey = RATE_PRESETS.includes(String(s.rate)) ? String(s.rate) : 'custom';
  const umaOpts = [['10-30','10-30'],['10-20','10-20'],['5-15','5-15'],['5-10','5-10'],['0','なし'],['custom','カスタム']]
    .map(([v,l]) => `<option value="${v}" ${v===umaKey?'selected':''}>${l}</option>`).join('');
  const rateOpts = [['10','×10'],['20','×20'],['30','×30'],['50','×50'],['100','×100（テンピン）'],['200','×200'],['500','×500'],['1000','×1000'],['2000','×2000'],['0','なし'],['custom','カスタム']]
    .map(([v,l]) => `<option value="${v}" ${v===rateKey?'selected':''}>${l}</option>`).join('');
  return `
    <div class="field"><label>ゲーム名</label><input type="text" id="${prefix}-name" value="${esc(name)}"></div>
    <div class="field"><label>プレイヤー名</label>
      ${s.playerNames.map((nm, i) => `<input type="text" id="${prefix}-p-${i}" value="${esc(nm)}" style="margin-bottom:6px">`).join('')}
    </div>
    <div class="field"><label>持ち点</label><input type="number" id="${prefix}-start" value="${s.startPoints}"></div>
    <div class="field"><label>返し点</label><input type="number" id="${prefix}-return" value="${s.returnPoints}"></div>
    <div class="field"><label>ウマ</label>
      <select id="${prefix}-uma" onchange="document.getElementById('${prefix}-uma-custom').style.display=this.value==='custom'?'block':'none'">${umaOpts}</select>
      <div id="${prefix}-uma-custom" style="display:${umaKey==='custom'?'block':'none'};margin-top:6px">
        <div class="custom-uma-grid">
          ${Array.from({length: n}, (_, i) => `<div class="field"><label>${i+1}位</label><input type="number" id="${prefix}-uma-c-${i}" value="${s.uma[i] ?? 0}"></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="field"><label>レート</label>
      <select id="${prefix}-rate" onchange="document.getElementById('${prefix}-rate-custom').style.display=this.value==='custom'?'block':'none'">${rateOpts}</select>
      <div id="${prefix}-rate-custom" style="display:${rateKey==='custom'?'block':'none'};margin-top:6px">
        <input type="number" id="${prefix}-rate-c" value="${rateKey==='custom'?s.rate:''}" placeholder="倍率">
      </div>
    </div>`;
}
function readSettingsForm(s, prefix) {
  const n = s.numPlayers;
  const name = document.getElementById(prefix+'-name').value.trim() || todayStr();
  const playerNames = Array.from({length: n}, (_, i) => document.getElementById(`${prefix}-p-${i}`).value.trim() || ('プレイヤー'+(i+1)));
  const startPoints = Number(document.getElementById(prefix+'-start').value) || 25000;
  const returnPoints = Number(document.getElementById(prefix+'-return').value) || 30000;
  const umaKey = document.getElementById(prefix+'-uma').value;
  let uma;
  if (umaKey === 'custom') uma = Array.from({length: n}, (_, i) => Number(document.getElementById(`${prefix}-uma-c-${i}`).value) || 0);
  else { const full = UMA_MAP[umaKey]; uma = n === 3 ? [full[0], full[1], full[3]] : full.slice(0, 4); }
  const rateKey = document.getElementById(prefix+'-rate').value;
  const rate = rateKey === 'custom' ? (Number(document.getElementById(prefix+'-rate-c').value) || 0) : Number(rateKey);
  return { name, settings: { ...s, playerNames, startPoints, returnPoints, uma, rate } };
}
function openGameEdit() {
  if (!activeGame) return;
  document.getElementById('form-modal-title').textContent = 'ゲーム設定を編集';
  document.getElementById('form-modal-body').innerHTML =
    settingsFormHtml(activeGame.name, activeGame.settings, 'e') +
    `<button class="confirm-btn" style="margin-top:10px" onclick="saveGameEdit()">保存する</button>
     <button class="modal-cancel" style="width:100%;margin-top:8px" onclick="closeFormModal()">キャンセル</button>`;
  document.getElementById('form-modal').classList.add('open');
}
async function saveGameEdit() {
  const { name, settings } = readSettingsForm(activeGame.settings, 'e');
  // 設定変更に合わせて全局のスコアを再計算
  const rounds = activeGame.rounds.map(r => ({ ...r, scores: calcScores(r.points, settings) }));
  const logEntry = { type: 'edit', at: new Date().toISOString(), label: 'ゲーム設定を変更' };
  closeFormModal();
  try {
    await db.ref('sessions/' + sessionId).update({ name, settings, rounds: rounds.length ? rounds : null, log: [...(activeGame.log || []), logEntry] });
    savePlayerNames(settings.playerNames);
    showToast('設定を更新しました');
  } catch(e) { showToast('保存に失敗しました'); }
}

// ---- 履歴 ----
function historyItemHtml(g) {
  const date = new Date(g.createdAt).toLocaleDateString('ja-JP');
  const n = g.settings ? g.settings.numPlayers : '?';
  const rounds = g.rounds ? g.rounds.length : 0;
  return `<div class="history-item" onclick="viewDetailById('${esc(g.id)}')">
    <div class="history-info">
      <div class="history-name">${esc(g.name)}</div>
      <div class="history-meta">${date} · ${n}人 · ${rounds}局</div>
    </div>
    <div class="history-arrow">›</div>
  </div>`;
}
function renderHistory() {
  const body = document.getElementById('history-body');
  if (!appState.games || appState.games.length === 0) {
    body.innerHTML = '<div class="empty-msg">保存されたゲームはありません</div>'; return;
  }
  body.innerHTML = appState.games.map(historyItemHtml).join('');
}

let detailGame = null;
function viewDetailById(id) {
  const g = appState.games.find(x => x.id === id);
  if (g) viewDetail(g);
}
function viewDetail(g) {
  detailGame = g;
  document.getElementById('detail-title').textContent = g.name;
  const s = g.settings; const n = s.numPlayers;
  const totals = new Array(n).fill(0);
  g.rounds.forEach(r => r.scores.forEach((sc, i) => totals[i] += sc));
  const tRounded = totals.map(t => Math.round(t*10)/10);
  const ranked = tRounded.map((t,i) => ({t, i, name: s.playerNames[i]})).sort((a,b) => b.t - a.t);

  let html = '<div class="card"><div class="card-title">最終スコア</div><div class="score-cards">';
  ranked.forEach((p, rank) => {
    const yenStr = s.rate ? `${(p.t * s.rate).toLocaleString()}円` : '';
    const cls = p.t >= 0 ? 'pos' : 'neg';
    html += `<div class="score-card">
      ${rankBadgeHtml(rank)}
      <div class="score-info">
        <div class="score-name">${esc(p.name)}</div>
        ${yenStr ? `<div class="score-yen">${yenStr}</div>` : ''}
      </div>
      <div class="score-val ${cls}">${p.t >= 0 ? '+' : ''}${p.t.toFixed(1)}</div>
    </div>`;
  });
  html += '</div></div>';

  const rows = g.rounds.map((r, ridx) => roundRowHtml(r, ridx, `editDetailRound(${ridx})`)).join('');
  html += `<div class="card"><div class="card-title">局履歴</div>
    <div style="overflow-x:auto"><table class="rounds-table" style="table-layout:fixed">
      ${roundsTheadHtml(s.playerNames)}
      <tbody>${rows}</tbody>
    </table></div>
    ${g.rounds.length ? '<div style="font-size:11px;color:#aaa;margin-top:6px">行をタップすると点数を修正できます</div>' : ''}
    ${renderLogHtml(g.log)}
    ${rankCountHtml(g.rounds, s.playerNames)}</div>`;

  // スコア推移グラフ（局履歴の下）
  if (g.rounds.length > 0) {
    html += `<div class="card"><div class="card-title">スコア推移</div>
      <div class="chart-wrap">${chartHtml(g.rounds, s.playerNames)}</div></div>`;
  }

  html += `<div class="card"><div class="card-title">設定</div>
    <div style="font-size:13px;color:#555;line-height:2.2">
      持ち点: ${s.startPoints.toLocaleString()} ／ 返し点: ${s.returnPoints.toLocaleString()}<br>
      ウマ: ${s.uma.join(' / ')} ／ レート: ×${s.rate}
    </div></div>`;
  document.getElementById('detail-body').innerHTML = html;
  showView('detail');
}

// ---- 過去の結果の編集 ----
// 局の点数編集: 点数入力シートを過去ゲーム用コンテキストで開く
function editDetailRound(ridx) {
  if (!detailGame) return;
  const g = detailGame;
  openSheetCtx({
    settings: g.settings,
    rounds: g.rounds,
    save: (rounds, logEntry) => {
      g.rounds = rounds;
      g.log = [...(g.log || []), logEntry];
      saveStorage();
      viewDetail(g);
      showToast('更新しました');
    }
  }, ridx);
}
// ゲーム名・プレイヤー名の編集
function openDetailEdit() {
  if (!detailGame) return;
  const g = detailGame;
  document.getElementById('form-modal-title').textContent = '結果を編集';
  document.getElementById('form-modal-body').innerHTML = `
    <div class="field"><label>ゲーム名</label><input type="text" id="d-name" value="${esc(g.name)}"></div>
    <div class="field"><label>プレイヤー名</label>
      ${g.settings.playerNames.map((nm, i) => `<input type="text" id="d-p-${i}" value="${esc(nm)}" style="margin-bottom:6px">`).join('')}
    </div>
    <button class="confirm-btn" style="margin-top:10px" onclick="saveDetailEdit()">保存する</button>
    <button class="modal-cancel" style="width:100%;margin-top:8px" onclick="closeFormModal()">キャンセル</button>`;
  document.getElementById('form-modal').classList.add('open');
}
function saveDetailEdit() {
  const g = detailGame;
  g.name = document.getElementById('d-name').value.trim() || g.name;
  g.settings.playerNames = g.settings.playerNames.map((nm, i) =>
    document.getElementById(`d-p-${i}`).value.trim() || nm);
  saveStorage();
  closeFormModal();
  viewDetail(g);
  showToast('更新しました');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- 起動 ----
loadStorage();
initSetupForm();
const urlHash = location.hash.slice(1);
if (urlHash && urlHash.length > 5) {
  pendingSessionId = urlHash;
  document.getElementById('join-banner').style.display = 'block';
  joinSession(urlHash);
}
</script>
