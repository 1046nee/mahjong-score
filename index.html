<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀スコア管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }

.view { display: none; min-height: 100vh; flex-direction: column; }
.view.active { display: flex; }

.header { background: #1a237e; color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.back-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 4px 8px; }
.share-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: #fff; border-radius: 8px; padding: 6px 12px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* Home */
#view-home { background: linear-gradient(135deg, #1a237e 0%, #283593 60%, #3949ab 100%); justify-content: center; align-items: center; gap: 20px; }
.home-title { color: #fff; font-size: 28px; font-weight: 800; letter-spacing: 2px; text-align: center; }
.home-sub { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 20px; text-align: center; }
.home-btn { width: 240px; padding: 18px; border-radius: 12px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.home-btn:active { transform: scale(0.97); }
.home-btn-primary { background: #fff; color: #1a237e; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.home-btn-secondary { background: rgba(255,255,255,0.15); color: #fff; border: 2px solid rgba(255,255,255,0.5); }
.join-banner { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 12px; padding: 16px 20px; width: 240px; text-align: center; }
.join-banner p { color: rgba(255,255,255,0.85); font-size: 13px; margin-bottom: 10px; }
.join-banner strong { color: #fff; font-size: 15px; display: block; margin-bottom: 10px; word-break: break-all; }
.join-btn { background: #fff; color: #1a237e; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }

/* Setup */
#view-setup { background: #f0f2f5; }
.form-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-title { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
label { font-size: 13px; color: #555; font-weight: 600; }
input[type=text], input[type=number], select { border: 1.5px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 15px; transition: border-color 0.2s; outline: none; width: 100%; }
input:focus, select:focus { border-color: #1a237e; }
.toggle-group { display: flex; border: 1.5px solid #ddd; border-radius: 8px; overflow: hidden; }
.toggle-btn { flex: 1; padding: 10px; background: #fff; border: none; font-size: 14px; font-weight: 600; cursor: pointer; color: #555; transition: background 0.2s, color 0.2s; }
.toggle-btn.active { background: #1a237e; color: #fff; }
.player-inputs { display: flex; flex-direction: column; gap: 8px; }
.custom-uma-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.custom-uma-grid .field { margin-bottom: 0; }
.submit-btn { background: #1a237e; color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin: 0 16px 24px; }
.submit-btn:active { opacity: 0.85; }

/* Game */
#view-game { background: #f0f2f5; }
.game-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 100px; }
.score-cards { display: flex; flex-direction: column; gap: 10px; }
.score-card { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 12px; }
.rank-badge { font-size: 20px; font-weight: 800; color: #1a237e; width: 28px; text-align: center; }
.score-info { flex: 1; }
.score-name { font-size: 14px; font-weight: 700; }
.score-yen { font-size: 12px; color: #888; }
.score-val { font-size: 22px; font-weight: 800; }
.score-val.pos { color: #1a237e; }
.score-val.neg { color: #c62828; }

/* Rounds table */
.rounds-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rounds-table th { background: #1a237e; color: #fff; padding: 8px 6px; text-align: center; font-size: 12px; }
.rounds-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #eee; }
.rounds-table tr:last-child td { border-bottom: none; }
.round-actions { display: flex; gap: 4px; justify-content: center; }
.round-edit-btn { background: #e8f0fe; border: none; color: #1a237e; border-radius: 5px; padding: 3px 7px; font-size: 12px; cursor: pointer; }
.round-del-btn { background: #ffebee; border: none; color: #c62828; border-radius: 5px; padding: 3px 7px; font-size: 12px; cursor: pointer; }

/* Settlement */
.settlement-list { display: flex; flex-direction: column; gap: 10px; }
.settlement-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #f8f9ff; border-radius: 10px; }
.settlement-from { font-weight: 700; font-size: 14px; color: #c62828; flex: 1; }
.settlement-arrow { color: #888; font-size: 16px; }
.settlement-to { font-weight: 700; font-size: 14px; color: #1a237e; flex: 1; text-align: right; }
.settlement-amount { font-size: 15px; font-weight: 800; color: #1a1a1a; white-space: nowrap; margin-left: 8px; }
.settlement-empty { font-size: 13px; color: #aaa; text-align: center; padding: 8px 0; }

.fab { position: fixed; bottom: 24px; right: 24px; background: #1a237e; color: #fff; border: none; border-radius: 50px; padding: 14px 24px; font-size: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(26,35,126,0.4); z-index: 100; }
.end-btn { background: #c62828; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }

/* Confirm modal */
.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: center; justify-content: center; padding: 24px; }
.modal-backdrop.open { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 320px; text-align: center; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.modal-desc { font-size: 13px; color: #666; margin-bottom: 20px; line-height: 1.6; }
.modal-btns { display: flex; gap: 10px; }
.modal-cancel { flex: 1; background: #f0f0f0; color: #555; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
.modal-danger { flex: 1; background: #c62828; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* Edited badge */
.edited-badge { display: inline-block; font-size: 10px; color: #888; background: #f0f0f0; border-radius: 4px; padding: 1px 5px; margin-left: 4px; vertical-align: middle; white-space: nowrap; }

/* Player name chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { background: #e8f0fe; color: #1a237e; border: none; border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
.chip:active { opacity: 0.7; }
.chips-hint { font-size: 11px; color: #999; margin-bottom: 6px; }

/* Collapsible settlement */
details.settle-details summary { list-style: none; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; user-select: none; }
details.settle-details summary::-webkit-details-marker { display: none; }
details.settle-details summary .toggle-arrow { font-size: 14px; color: #1a237e; transition: transform 0.2s; }
details.settle-details[open] summary .toggle-arrow { transform: rotate(90deg); }
details.settle-details[open] summary { margin-bottom: 12px; }

/* Score chart */
.chart-wrap { width: 100%; }
.chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
.chart-legend span { font-size: 12px; font-weight: 600; color: #555; display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

/* Stats */
.stats-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.stats-table th { background: #1a237e; color: #fff; padding: 8px 6px; font-size: 12px; }
.stats-table td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #eee; }
.stats-table td:first-child { text-align: left; font-weight: 700; }

/* Toast */
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Loading */
.loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 16px; }
.spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #1a237e; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Sheet */
.backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
.backdrop.open { display: block; }
.sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 20px 16px 32px; z-index: 201; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); max-height: 90vh; overflow-y: auto; }
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 16px; }
.sheet-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.sheet-row { display: flex; align-items: center; gap: 10px; }
.sheet-row label { width: 90px; font-size: 13px; font-weight: 600; color: #555; flex-shrink: 0; }
.sheet-row input { flex: 1; border: 1.5px solid #ddd; border-radius: 8px; padding: 10px; font-size: 16px; text-align: right; outline: none; }
.sheet-row input:focus { border-color: #1a237e; }
.auto-btn { background: #e8f0fe; color: #1a237e; border: 1.5px solid #1a237e; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 10px; }
.auto-btn:disabled { background: #f0f0f0; color: #bbb; border-color: #ddd; cursor: not-allowed; }
.total-check { text-align: center; font-size: 13px; margin-bottom: 16px; padding: 8px; border-radius: 8px; font-weight: 600; }
.total-check.ok { background: #e8f5e9; color: #2e7d32; }
.total-check.ng { background: #ffebee; color: #c62828; }
.confirm-btn { background: #1a237e; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
.confirm-btn:disabled { background: #aaa; cursor: not-allowed; }

/* History */
#view-history { background: #f0f2f5; }
.history-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.history-item { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); cursor: pointer; display: flex; align-items: center; gap: 12px; }
.history-item:active { opacity: 0.75; }
.history-info { flex: 1; }
.history-name { font-size: 15px; font-weight: 700; }
.history-meta { font-size: 12px; color: #888; margin-top: 2px; }
.history-arrow { color: #bbb; font-size: 18px; }
.empty-msg { text-align: center; color: #aaa; margin-top: 60px; font-size: 15px; }

/* Detail */
#view-detail { background: #f0f2f5; }
.detail-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; padding-bottom: 24px; }
</style>
</head>
<body>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="home-title">🀄 麻雀スコア</div>
  <div class="home-sub">スコア管理アプリ</div>
  <button class="home-btn home-btn-primary" onclick="showView('setup')">新しいゲームを始める</button>
  <button class="home-btn home-btn-secondary" onclick="showView('history')">過去の結果を見る</button>
  <div class="join-banner" id="join-banner" style="display:none">
    <p>共有されたゲームがあります</p>
    <button class="join-btn" onclick="joinFromBanner()">このゲームに参加する</button>
  </div>
</div>

<!-- SETUP -->
<div id="view-setup" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('home')">←</button>
    <h1>ゲーム設定</h1>
  </div>
  <div class="form-body">
    <div class="card">
      <div class="card-title">基本情報</div>
      <div class="field">
        <label>ゲーム名</label>
        <input type="text" id="s-name" placeholder="例: 2025-07-01">
      </div>
      <div class="field">
        <label>人数</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="p4-btn" onclick="setPlayers(4)">4人</button>
          <button class="toggle-btn" id="p3-btn" onclick="setPlayers(3)">3人</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">プレイヤー名</div>
      <div id="saved-players-area" style="display:none">
        <div class="chips-hint">保存済みの名前（タップで入力）</div>
        <div class="chips" id="saved-player-chips"></div>
      </div>
      <div class="player-inputs" id="player-inputs"></div>
    </div>
    <div class="card">
      <div class="card-title">点数設定</div>
      <div class="field">
        <label>持ち点</label>
        <input type="number" id="s-start" value="25000">
      </div>
      <div class="field">
        <label>返し点</label>
        <input type="number" id="s-return" value="30000">
      </div>
    </div>
    <div class="card">
      <div class="card-title">ウマ</div>
      <div class="field">
        <select id="s-uma" onchange="onUmaChange()">
          <option value="10-30">10-30</option>
          <option value="10-20">10-20</option>
          <option value="5-15">5-15</option>
          <option value="5-10">5-10</option>
          <option value="0">なし</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div id="uma-custom" style="display:none">
        <div class="custom-uma-grid" id="uma-custom-fields"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">レート</div>
      <div class="field">
        <select id="s-rate" onchange="onRateChange()">
          <option value="10">×10（テンイチ）</option>
          <option value="20">×20（テンニ）</option>
          <option value="30">×30（テンサン）</option>
          <option value="50">×50（テンゴ）</option>
          <option value="100">×100（テンピン）</option>
          <option value="200">×200（テンリャンピン）</option>
          <option value="500">×500（ゴジュー）</option>
          <option value="1000">×1000（デカピン）</option>
          <option value="2000">×2000（デカリャンピン）</option>
          <option value="0">なし</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div id="rate-custom" style="display:none">
        <div class="field">
          <label>カスタムレート（倍率）</label>
          <input type="number" id="s-rate-custom" placeholder="例: 150">
        </div>
      </div>
    </div>
  </div>
  <button class="submit-btn" onclick="startGame()">ゲームを開始する →</button>
</div>

<!-- GAME -->
<div id="view-game" class="view">
  <div class="header">
    <button class="back-btn" onclick="leaveGame()">←</button>
    <h1 id="game-title">ゲーム中</h1>
    <button class="share-btn" onclick="copyUrl()">🔗 共有</button>
  </div>
  <div class="game-body">
    <div class="card">
      <div class="card-title">合計スコア</div>
      <div class="score-cards" id="score-cards"></div>
    </div>
    <div class="card">
      <div class="card-title">局履歴</div>
      <div style="overflow-x:auto">
        <table class="rounds-table" id="rounds-table"></table>
      </div>
    </div>
    <div class="card" id="chart-card" style="display:none">
      <div class="card-title">スコア推移</div>
      <div class="chart-wrap" id="chart-body"></div>
    </div>
    <div class="card" id="settlement-card" style="display:none">
      <details class="settle-details">
        <summary>精算 <span class="toggle-arrow">▸</span></summary>
        <div class="settlement-list" id="settlement-body"></div>
      </details>
    </div>
    <div class="card">
      <button class="end-btn" onclick="endGame()">試合終了・保存</button>
    </div>
  </div>
  <button class="fab" onclick="openSheet(-1)">＋ 点数入力</button>
</div>

<!-- HISTORY -->
<div id="view-history" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('home')">←</button>
    <h1>過去の結果</h1>
    <button class="share-btn" onclick="showView('stats')">📊 統計</button>
  </div>
  <div class="history-body" id="history-body"></div>
</div>

<!-- STATS -->
<div id="view-stats" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('history')">←</button>
    <h1>プレイヤー統計</h1>
  </div>
  <div class="detail-body" id="stats-body"></div>
</div>

<!-- DETAIL -->
<div id="view-detail" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('history')">←</button>
    <h1 id="detail-title">結果詳細</h1>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Bottom sheet -->
<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="score-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">点数入力</div>
  <div class="sheet-inputs" id="sheet-inputs"></div>
  <button class="auto-btn" id="auto-btn" onclick="autoFill()" disabled>残り1人を自動入力</button>
  <div class="total-check ng" id="total-check">点数を入力してください</div>
  <button class="confirm-btn" id="confirm-btn" onclick="submitRound()" disabled>入力完了</button>
</div>

<!-- Confirm modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal">
    <div class="modal-title" id="confirm-modal-title">確認</div>
    <div class="modal-desc" id="confirm-modal-desc"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeConfirmModal()">キャンセル</button>
      <button class="modal-danger" id="confirm-modal-ok">削除する</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDzZPhT7OzQDpaMXorp__yZ57v16VRY4W4",
  authDomain: "mahjong-score-2e8aa.firebaseapp.com",
  databaseURL: "https://mahjong-score-2e8aa-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mahjong-score-2e8aa",
  storageBucket: "mahjong-score-2e8aa.firebasestorage.app",
  messagingSenderId: "742827563606",
  appId: "1:742827563606:web:91b4e849caa99eda7f39f7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const UMA_MAP = {
  '10-30': [30, 10, -10, -30],
  '10-20': [20, 10, -10, -20],
  '5-15':  [15, 5, -5, -15],
  '5-10':  [10, 5, -5, -10],
  '0':     [0, 0, 0, 0]
};

let numPlayers = 4;
let activeGame = null;
let sessionId = null;
let sessionRef = null;
let sessionCallback = null;
let pendingSessionId = null;
let editingIndex = -1; // 修正中の局インデックス（-1 = 新規）
let appState = { games: [], players: [] };

// ---- Storage ----
function loadStorage() {
  try { const d = localStorage.getItem('mahjong-v3'); if (d) appState = JSON.parse(d); } catch(e) {}
  if (!appState.players) appState.players = [];
}
function saveStorage() {
  localStorage.setItem('mahjong-v3', JSON.stringify(appState));
}
function saveToLocalHistory() {
  if (!activeGame) return;
  const idx = appState.games.findIndex(g => g.id === activeGame.id);
  if (idx >= 0) appState.games[idx] = activeGame;
  else appState.games.unshift(activeGame);
  saveStorage();
}

// ---- Firebase ----
function generateSessionId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  return Array.from({length: 10}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}
function startListening() {
  stopListening();
  sessionRef = db.ref('sessions/' + sessionId);
  sessionCallback = sessionRef.on('value', snapshot => {
    const data = snapshot.val();
    if (!data) return;
    const rounds = data.rounds
      ? (Array.isArray(data.rounds) ? data.rounds : Object.values(data.rounds)).filter(Boolean)
      : [];

// ---- Game ----
function calcScores(points, settings) {
  const n = settings.numPlayers;
  const diffs = points.map(p => (p - settings.returnPoints) / 1000);
  const order = diffs.map((d,i) => ({d,i})).sort((a,b) => b.d - a.d);
  const result = new Array(n);
  order.forEach((o, rank) => { result[o.i] = Math.round((diffs[o.i] + settings.uma[rank]) * 10) / 10; });
  return result;
}
function getTotals() {
  if (!activeGame) return [];
  const n = activeGame.settings.numPlayers;
  const totals = new Array(n).fill(0);
  activeGame.rounds.forEach(r => r.scores.forEach((s, i) => totals[i] += s));
  return totals.map(t => Math.round(t * 10) / 10);
}

// ---- スコア推移グラフ（SVG） ----
const CHART_COLORS = ['#1a237e', '#c62828', '#2e7d32', '#f9a825'];
function chartHtml(rounds, playerNames) {
  if (!rounds || rounds.length === 0) return '';
  const n = playerNames.length;
  // 0局目=全員0から始まる累積スコア
  const series = Array.from({length: n}, () => [0]);
  rounds.forEach(r => r.scores.forEach((sc, i) => {
    series[i].push(Math.round((series[i][series[i].length-1] + sc) * 10) / 10);
  }));
  const all = series.flat();
  let min = Math.min(...all), max = Math.max(...all);
  if (min === max) { min -= 10; max += 10; }
  const range = max - min;
  min -= range * 0.08; max += range * 0.08;

  const W = 340, H = 200, left = 42, right = 12, top = 10, bottom = 24;
  const R = rounds.length;
  const px = i => left + (W - left - right) * (i / R);
  const py = v => top + (H - top - bottom) * ((max - v) / (max - min));

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">`;
  // 横グリッド線（min/0/max）
  const gridVals = [...new Set([Math.ceil(min), 0, Math.floor(max)])].filter(v => v >= min && v <= max);
  gridVals.forEach(v => {
    const y = py(v);
    const strong = v === 0;
    svg += `<line x1="${left}" y1="${y}" x2="${W-right}" y2="${y}" stroke="${strong ? '#bbb' : '#eee'}" stroke-width="${strong ? 1.5 : 1}"/>`;
    svg += `<text x="${left-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#999">${v > 0 ? '+' : ''}${v}</text>`;
  });
  // X軸ラベル（局番号）
  for (let i = 0; i <= R; i++) {
    svg += `<text x="${px(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="#999">${i === 0 ? '開始' : i}</text>`;
  }
  // 折れ線
  series.forEach((s, i) => {
    const color = CHART_COLORS[i % CHART_COLORS.length];
    const pts = s.map((v, x) => `${px(x)},${py(v)}`).join(' ');
    svg += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    s.forEach((v, x) => { svg += `<circle cx="${px(x)}" cy="${py(v)}" r="3" fill="${color}"/>`; });
  });
  svg += '</svg>';

  const legend = '<div class="chart-legend">' + playerNames.map((nm, i) =>
    `<span><span class="legend-dot" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></span>${esc(nm)}</span>`
  ).join('') + '</div>';
  return svg + legend;
}

// ---- 精算計算 ----
function calcSettlement(totals, playerNames, rate) {
  const n = totals.length;
  // レートが0の場合はpt単位、それ以外は円単位
  const useYen = rate > 0;
  const amounts = totals.map((t, i) => ({
    i, name: playerNames[i],
    amount: useYen ? Math.round(t * rate) : t
  }));

  const payers = amounts.filter(a => a.amount < 0).map(a => ({ ...a, rem: -a.amount }))
                        .sort((a,b) => b.rem - a.rem);
  const receivers = amounts.filter(a => a.amount > 0).map(a => ({ ...a, rem: a.amount }))
                           .sort((a,b) => b.rem - a.rem);

  const txns = [];
  let pi = 0, ri = 0;
  while (pi < payers.length && ri < receivers.length) {
    const amount = Math.min(payers[pi].rem, receivers[ri].rem);
    if (amount > 0) {
      txns.push({ from: payers[pi].name, to: receivers[ri].name, amount, useYen });
    }
    payers[pi].rem -= amount;
    receivers[ri].rem -= amount;
    if (payers[pi].rem <= 0) pi++;
    if (receivers[ri].rem <= 0) ri++;
  }
  return txns;
}

function renderGame() {
  if (!activeGame) return;
  const s = activeGame.settings;
  document.getElementById('game-title').textContent = activeGame.name;

  // スコアカード
  const totals = getTotals();
  const ranked = totals.map((t,i) => ({t, i, name: s.playerNames[i]})).sort((a,b) => b.t - a.t);
  document.getElementById('score-cards').innerHTML = ranked.map((p, rank) => {
    const yenStr = s.rate ? `${(p.t * s.rate).toLocaleString()}円` : '';
    const cls = p.t >= 0 ? 'pos' : 'neg';
    return `<div class="score-card">
      <div class="rank-badge">${rank+1}</div>
      <div class="score-info">
        <div class="score-name">${esc(p.name)}</div>
        ${yenStr ? `<div class="score-yen">${yenStr}</div>` : ''}
      </div>
      <div class="score-val ${cls}">${p.t >= 0 ? '+' : ''}${p.t.toFixed(1)}</div>
    </div>`;
  }).join('');

  // 精算
  renderSettlement(totals, s.playerNames, s.rate);

  // 局履歴（修正・削除ボタン付き）
  const hasRounds = activeGame.rounds.length > 0;
  let tableHtml = `<thead><tr><th>局</th>${s.playerNames.map(n=>`<th>${esc(n)}</th>`).join('')}<th></th></tr></thead><tbody>`;
  if (hasRounds) {
    tableHtml += activeGame.rounds.map((r, idx) => {
      const cells = r.scores.map(sc => {
        const st = sc > 0 ? 'color:#1a237e;font-weight:700' : sc < 0 ? 'color:#c62828;font-weight:700' : '';
        return `<td style="${st}">${sc > 0 ? '+' : ''}${sc.toFixed(1)}</td>`;
      }).join('');
      const editedMark = r.edited ? '<span class="edited-badge">修正済み</span>' : '';
      return `<tr>
        <td style="color:#888;white-space:nowrap">${idx+1}${editedMark}</td>
        ${cells}
        <td>
          <div class="round-actions">
            <button class="round-edit-btn" onclick="openSheet(${idx})">修正</button>
            <button class="round-del-btn" onclick="confirmDeleteRound(${idx})">削除</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  } else {
    tableHtml += `<tr><td colspan="${s.numPlayers + 2}" style="color:#bbb;padding:16px">局なし</td></tr>`;
  }
  tableHtml += '</tbody>';
  document.getElementById('rounds-table').innerHTML = tableHtml;

  // スコア推移グラフ
  const chartCard = document.getElementById('chart-card');
  if (hasRounds) {
    chartCard.style.display = 'block';
    document.getElementById('chart-body').innerHTML = chartHtml(activeGame.rounds, s.playerNames);
  } else {
    chartCard.style.display = 'none';
  }
}

function renderSettlement(totals, playerNames, rate) {
  const card = document.getElementById('settlement-card');
  const body = document.getElementById('settlement-body');
  const txns = calcSettlement(totals, playerNames, rate);
  if (txns.length === 0) {
    card.style.display = 'none';
    return;
  }
  card.style.display = 'block';
  body.innerHTML = txns.map(t => {
    const amtStr = t.useYen ? `${t.amount.toLocaleString()}円` : `${t.amount > 0 ? '+' : ''}${t.amount.toFixed(1)}pt`;
    return `<div class="settlement-row">
      <span class="settlement-from">${esc(t.from)}</span>
      <span class="settlement-arrow">→</span>
      <span class="settlement-to">${esc(t.to)}</span>
      <span class="settlement-amount">${amtStr}</span>
    </div>`;
  }).join('');
}

// idx = -1: 新規, idx >= 0: 修正
function openSheet(idx) {
  editingIndex = idx;
  const s = activeGame.settings;
  const n = s.numPlayers;
  const isEdit = idx >= 0;
  const existingPoints = isEdit ? activeGame.rounds[idx].points : null;

  document.getElementById('sheet-title').textContent = isEdit ? `第${idx+1}局を修正` : '点数入力';
  const inputs = document.getElementById('sheet-inputs');
  inputs.innerHTML = s.playerNames.map((name, i) =>
    `<div class="sheet-row">
      <label>${esc(name)}</label>
      <input type="number" id="si-${i}" placeholder="点数" oninput="updateTotal()"
        value="${isEdit ? existingPoints[i] : ''}">
    </div>`
  ).join('');

  document.getElementById('total-check').textContent = '点数を入力してください';
  document.getElementById('total-check').className = 'total-check ng';
  document.getElementById('auto-btn').disabled = true;
  document.getElementById('confirm-btn').disabled = true;
  document.getElementById('backdrop').classList.add('open');
  document.getElementById('score-sheet').classList.add('open');

  // 修正モードでは初期値があるので合計を計算
  if (isEdit) updateTotal();
  else setTimeout(() => { const el = document.getElementById('si-0'); if(el) el.focus(); }, 350);
}
function closeSheet() {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('score-sheet').classList.remove('open');
  editingIndex = -1;
}
function updateTotal() {
  const n = activeGame.settings.numPlayers;
  const expected = activeGame.settings.startPoints * n;
  const values = Array.from({length: n}, (_, i) => {
    const el = document.getElementById('si-' + i);
    return el.value === '' ? null : Number(el.value);
  });
  const emptyIndices = values.map((v,i) => v === null ? i : -1).filter(i => i >= 0);
  const filled = values.filter(v => v !== null).reduce((s,v) => s+v, 0);
  const total = values.reduce((s, v) => s + (v ?? 0), 0);
  document.getElementById('auto-btn').disabled = emptyIndices.length !== 1;
  const el = document.getElementById('total-check');
  const btn = document.getElementById('confirm-btn');
  if (emptyIndices.length === 0 && total === expected) {
    el.textContent = `入力合計: ${total.toLocaleString()} ✓`;
    el.className = 'total-check ok'; btn.disabled = false;
  } else {
    el.textContent = `入力合計: ${filled.toLocaleString()}`;
    el.className = 'total-check ng'; btn.disabled = true;
  }
}
function autoFill() {
  const n = activeGame.settings.numPlayers;
  const expected = activeGame.settings.startPoints * n;
  let filledSum = 0, emptyIdx = -1;
  for (let i = 0; i < n; i++) {
    const el = document.getElementById('si-' + i);
    if (el.value === '') emptyIdx = i; else filledSum += Number(el.value);
  }
  if (emptyIdx < 0) return;
  document.getElementById('si-' + emptyIdx).value = expected - filledSum;
  updateTotal();
}
async function submitRound() {
  const n = activeGame.settings.numPlayers;
  const points = Array.from({length: n}, (_, i) => Number(document.getElementById('si-'+i).value) || 0);
  const scores = calcScores(points, activeGame.settings);
  const newRounds = [...activeGame.rounds];
  if (editingIndex >= 0) {
    newRounds[editingIndex] = { points, scores, edited: true }; // 修正
  } else {
    newRounds.push({ points, scores }); // 新規
  }
  closeSheet();
  try {
    await writeRoundsToFirebase(newRounds);
  } catch(e) { showToast('保存に失敗しました'); }
}

    }).join('');
    const editedMark = r.edited ? '<span class="edited-badge">修正済み</span>' : '';
    return `<tr><td style="color:#888;white-space:nowrap">${ridx+1}${editedMark}</td>${cells}</tr>`;
  }).join('');
  html += `<div class="card"><div class="card-title">局履歴</div>
    <div style="overflow-x:auto"><table class="rounds-table">
      <thead><tr><th>局</th>${s.playerNames.map(n=>`<th>${esc(n)}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div></div>`;

  // スコア推移グラフ（局履歴の下）
  if (g.rounds.length > 0) {
    html += `<div class="card"><div class="card-title">スコア推移</div>
      <div class="chart-wrap">${chartHtml(g.rounds, s.playerNames)}</div></div>`;
  }

  // 精算（タップで開閉）
  const txns = calcSettlement(tRounded, s.playerNames, s.rate);
  if (txns.length > 0) {
    const settleRows = txns.map(t => {
      const amtStr = t.useYen ? `${t.amount.toLocaleString()}円` : `${t.amount.toFixed(1)}pt`;
      return `<div class="settlement-row">
        <span class="settlement-from">${esc(t.from)}</span>
        <span class="settlement-arrow">→</span>
        <span class="settlement-to">${esc(t.to)}</span>
        <span class="settlement-amount">${amtStr}</span>
      </div>`;
    }).join('');
    html += `<div class="card"><details class="settle-details">
      <summary>精算 <span class="toggle-arrow">▸</span></summary>
      <div class="settlement-list">${settleRows}</div>
    </details></div>`;
  }

  html += `<div class="card"><div class="card-title">設定</div>
    <div style="font-size:13px;color:#555;line-height:2.2">
      持ち点: ${s.startPoints.toLocaleString()} ／ 返し点: ${s.returnPoints.toLocaleString()}<br>
      ウマ: ${s.uma.join(' / ')} ／ レート: ×${s.rate}
    </div></div>`;
  document.getElementById('detail-body').innerHTML = html;
  showView('detail');
}

// ---- プレイヤー統計 ----
function renderStats() {
  const body = document.getElementById('stats-body');
  if (!appState.games || appState.games.length === 0) {
    body.innerHTML = '<div class="empty-msg">データがありません</div>'; return;
  }
  // プレイヤー名ごとに集計（保存済みゲームの最終順位ベース）
  const stats = {}; // name -> {games, totalScore, rankCounts, totalYen}
  appState.games.forEach(g => {
    if (!g.settings || !g.rounds || g.rounds.length === 0) return;
    const totals = gameFinalTotals(g);
    const ranked = totals.map((t, i) => ({t, i})).sort((a, b) => b.t - a.t);
    ranked.forEach((r, rank) => {
      const name = g.settings.playerNames[r.i];
      if (!stats[name]) stats[name] = { games: 0, totalScore: 0, rankCounts: [0,0,0,0], totalYen: 0 };
      stats[name].games++;
      stats[name].totalScore += r.t;
      stats[name].rankCounts[rank]++;
      stats[name].totalYen += r.t * (g.settings.rate || 0);
    });
  });
  const rows = Object.entries(stats)
    .sort((a, b) => b[1].totalScore - a[1].totalScore)
    .map(([name, st]) => {
      const total = Math.round(st.totalScore * 10) / 10;
      const avg = Math.round(st.totalScore / st.games * 10) / 10;
      const topRate = Math.round(st.rankCounts[0] / st.games * 100);
      const cls = total >= 0 ? 'color:#1a237e;font-weight:700' : 'color:#c62828;font-weight:700';
      return `<tr>
        <td>${esc(name)}</td>
        <td>${st.games}</td>
        <td style="${cls}">${total >= 0 ? '+' : ''}${total.toFixed(1)}</td>
        <td>${avg >= 0 ? '+' : ''}${avg.toFixed(1)}</td>
        <td>${topRate}%</td>
        <td>${st.rankCounts[0]}-${st.rankCounts[1]}-${st.rankCounts[2]}-${st.rankCounts[3]}</td>
      </tr>`;
    }).join('');
  if (!rows) { body.innerHTML = '<div class="empty-msg">データがありません</div>'; return; }
  body.innerHTML = `<div class="card">
    <div class="card-title">通算成績（保存済みゲーム集計）</div>
    <div style="overflow-x:auto">
      <table class="stats-table">
        <thead><tr><th>名前</th><th>回数</th><th>通算</th><th>平均</th><th>1位率</th><th>順位分布</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="font-size:11px;color:#999;margin-top:10px">※順位分布は 1位-2位-3位-4位 の回数。この端末に保存されたゲームのみ集計されます。</div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadStorage();
initSetupForm();
const urlHash = location.hash.slice(1);
if (urlHash && urlHash.length > 5) {
  pendingSessionId = urlHash;
  document.getElementById('join-banner').style.display = 'block';
  joinSession(urlHash);
}
